name: allround
description: 올라운드 — 스포츠 동호인 통합 정보 앱
publish_to: 'none'
version: 1.0.0+4

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 인증·DB
  supabase_flutter: ^2.8.0

  # 상태 관리
  flutter_riverpod: ^2.6.1

  # 라우팅
  go_router: ^17.0.0

  # 네트워크
  http: ^1.3.0

  # Firebase / FCM
  firebase_core: ^4.0.0
  firebase_messaging: ^16.0.0

  # UI 보조
  intl: ^0.20.0
  url_launcher: ^6.3.0
  flutter_markdown: ^0.7.0
  shared_preferences: ^2.3.0
  skeletonizer: ^2.1.3

  # Speed Gun
  image_picker: ^1.1.0
  image: ^4.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - assets/images/tournaments/
    - assets/images/coachbot/
    - assets/images/coach/round-coach.png
    - assets/images/rules/
  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/PretendardVariable.ttf
