name: harness

on:
  pull_request:
  push:
    branches: [main]

jobs:
  repository-rules:
    name: Repository rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python3 scripts/harness/check_enums.py
      - run: python3 scripts/harness/check_static_rules.py
      - run: python3 scripts/qa/verify_ranking_rules.py
      - run: bash scripts/harness/check_secrets.sh

  database:
    name: Database pgTAP
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: 2.108.0
      # DB 테스트에 불필요한 서비스는 제외해 기동 시간을 줄인다.
      - run: supabase start -x edge-runtime,imgproxy,vector,logflare,studio
      - run: bash scripts/qa/run_db_tests.sh

  flutter:
    name: Flutter analyze/test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  deno:
    name: Deno Edge Functions
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: supabase/functions
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno fmt --check */*.ts _shared/*.ts _shared/crawler/parsers/*.ts tests/*.ts
      - run: deno lint --config deno.json */*.ts _shared/*.ts _shared/crawler/parsers/*.ts tests/*.ts
      - run: deno check --config deno.json */*.ts _shared/*.ts _shared/crawler/parsers/*.ts tests/*.ts
      - run: deno test --config deno.json --allow-env --allow-read tests
