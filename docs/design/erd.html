  .badge-existing { background: #f1f5f9; color: #94a3b8; }
  .badge-modified { background: #fef3c7; color: #92400e; }
  .badge-new { background: #d1fae5; color: #065f46; }

  .columns { display: none; background: #fafbfc; padding: 0 16px 12px 16px; }

  .col-type { color: #6366f1; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.75rem; white-space: nowrap; }
  .col-desc { color: #64748b; }
  .col-new { background: #f0fdf4; }
  .col-pk { color: #dc2626; font-weight: 800; }
  .col-fk { color: #2563eb; }

  .relations { margin-top: 6px; padding: 8px 12px; background: #eff6ff; border-radius: 8px; font-size: 0.75rem; color: #3b82f6; }
  .relations strong { color: #1e40af; }
</style>
</head>

function render() {
  const tree = document.getElementById('tree');
  tree.innerHTML = data.map((layer, li) => `
    <div class="layer">
      <div class="layer-header" onclick="toggleLayer(${li})">
        <span>${layer.layer}</span>
        <span>${layer.tables.length}개 테이블</span>
      </div>
      <div class="layer-body" id="layer-${li}">
        ${layer.tables.map((t, ti) => `
          <div class="table-row">
            <div class="table-header" onclick="toggleTable(${li},${ti})">
              <span class="table-icon">${t.icon}</span>
              <span class="table-name">${t.name}</span>
              <span class="table-badge badge-${t.status}">${t.status === 'new' ? '신규' : t.status === 'modified' ? '수정' : '기존'}</span>
              <span class="table-desc">${t.desc}</span>
              <span class="table-arrow" id="arrow-${li}-${ti}">▶</span>
            </div>
            <div class="columns" id="cols-${li}-${ti}">
              <table class="col-table">
                <tr><th>컬럼</th><th>타입</th><th>설명</th></tr>
                ${t.columns.map(c => `
                  <tr class="${c.isNew ? 'col-new' : ''}">
                    <td class="col-name ${c.pk ? 'col-pk' : ''} ${c.fk ? 'col-fk' : ''}">${c.name}${c.pk ? ' 🔑' : ''}${c.fk ? ' →' : ''}</td>
                    <td class="col-type">${c.type}</td>
                    <td class="col-desc">${c.desc}</td>
                  </tr>
                `).join('')}
              </table>
              ${t.relations.length ? `<div class="relations">${t.relations.map(r => `<div>${r}</div>`).join('')}</div>` : ''}
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function toggleLayer(li) {
  document.getElementById('layer-' + li).classList.toggle('collapsed');
}

function toggleTable(li, ti) {
  const cols = document.getElementById('cols-' + li + '-' + ti);
  const arrow = document.getElementById('arrow-' + li + '-' + ti);
  cols.classList.toggle('open');
  arrow.classList.toggle('open');
}

render();
</script>
